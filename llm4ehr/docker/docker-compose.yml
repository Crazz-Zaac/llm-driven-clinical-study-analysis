name: llm4hr

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    env_file:
      - ../app/.env  # .env file at project root
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - llm4ehr-network
    labels:
      - "com.example.service=qdrant"

  # FastAPI Application
  backend:
    image: backend:v1
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: llm4ehr-backend
    ports:
      - "8001:8000"    # FastAPI server
    env_file:
      - ../app/.env
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - llm4ehr-network
    labels:
      - "com.example.service=backend"

  # Next.js frontend
  frontend:
    image: frontend:v1
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: llm4ehr-frontend
    ports:
      - "3000:3000"    # Next.js server
    # env_file:
    #   - ../.env
    networks:
      - llm4ehr-network
    labels:
      - "com.example.service=frontend"

volumes:
  qdrant_storage:
    driver: local
  qdrant_snapshots:
    driver: local

networks:
  llm4ehr-network:
    driver: bridge

name: llm4hr

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    env_file:
      - ../.env  # .env file is outside the docker directory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - llm4ehr-network
    labels:
      - "com.example.service=qdrant"

  # FastAPI Application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: llm4ehr-api
    ports:
      - "8001:8000"    # FastAPI server
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - llm4ehr-network
    labels:
      - "com.example.service=api"

  # Optional: Literature Scraper (comment out if not needed)
  # scraper:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   container_name: llm4ehr-scraper
  #   volumes:
  #     - ../scripts:/app/scripts
  #     - ../dataset:/app/dataset
  #   environment:
  #     - PYTHONUNBUFFERED=1
  #   networks:
  #     - llm4ehr-network
  #   command: python scripts/scrape_literatures.py
  #   profiles:
  #     - scraper

volumes:
  qdrant_storage:
    driver: local
  qdrant_snapshots:
    driver: local

networks:
  llm4ehr-network:
    driver: bridge

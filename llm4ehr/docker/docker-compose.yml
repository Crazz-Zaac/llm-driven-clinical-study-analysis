name: clinical-rag

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-default_key}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - clinical-rag-network
    labels:
      - "com.example.service=qdrant"

  # FastAPI Application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: clinical-rag-api
    ports:
      - "8000:8000"    # FastAPI server
    volumes:
      - ../app:/app/app
      - ../scripts:/app/scripts
      - ../dataset:/app/dataset
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-default_key}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-ehr_documents}
      - HF_API_KEY=${HF_API_KEY:-your-huggingface-key}
      - HF_MODEL=${HF_MODEL:-mistralai/Mistral-7B-Instruct-v0.1}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-512}
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - clinical-rag-network
    labels:
      - "com.example.service=api"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Optional: Literature Scraper (comment out if not needed)
  # scraper:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   container_name: clinical-rag-scraper
  #   volumes:
  #     - ../scripts:/app/scripts
  #     - ../dataset:/app/dataset
  #   environment:
  #     - PYTHONUNBUFFERED=1
  #   networks:
  #     - clinical-rag-network
  #   command: python scripts/scrape_literatures.py
  #   profiles:
  #     - scraper

volumes:
  qdrant_storage:
    driver: local
  qdrant_snapshots:
    driver: local

networks:
  clinical-rag-network:
    driver: bridge

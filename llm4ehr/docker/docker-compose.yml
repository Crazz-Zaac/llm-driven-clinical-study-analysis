name: clinical-rag
services:
  scraper: # Scraper service
    build: .
    volumes:
      - ./script:/app/script
      - ./dataset:/app/dataset
    command: python /app/script/scrape_literatures.py 
  
  ollama: # Ollama service
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/data
    
  qdrant: # Qdrant service
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334" 
    volumes:
      - qdrant_storage:/qdrant/storage 
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_storage:

networks:
  default:
    name: clinical-rag-network

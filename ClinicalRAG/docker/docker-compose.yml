name: clinical-rag
services:
  scraper: # Scraper service
    build: .
    volumes:
      - ./script:/app/script
      - ./dataset:/app/dataset
    command: python /app/script/scrape_literatures.py 
  
  ollama: # Ollama service
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/data
    
  vector-db: # ChromaDB service
    image: chromadb/chroma
    ports:
      - "6333:6333"
    volumes:
      - chroma_data:/chroma

volumes:
  ollama_data:
  chroma_data:

networks:
  default:
    name: clinical-rag-network
